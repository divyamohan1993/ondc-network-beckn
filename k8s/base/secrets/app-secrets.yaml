apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ondc
  labels:
    app.kubernetes.io/part-of: ondc
type: Opaque
# REQUIRED: Generate all values before deploy.
# Generate with: openssl rand -base64 32
stringData:
  INTERNAL_API_KEY: ""      # REQUIRED: openssl rand -base64 32
  VAULT_MASTER_KEY: ""      # REQUIRED: openssl rand -base64 32
  VAULT_TOKEN_SECRET: ""    # REQUIRED: openssl rand -base64 32
  REGISTRY_SIGNING_PRIVATE_KEY: ""  # REQUIRED: Ed25519 private key
  GATEWAY_SIGNING_PRIVATE_KEY: ""   # REQUIRED: Ed25519 private key
  BAP_SIGNING_PRIVATE_KEY: ""       # REQUIRED: Ed25519 private key
  BPP_SIGNING_PRIVATE_KEY: ""       # REQUIRED: Ed25519 private key
