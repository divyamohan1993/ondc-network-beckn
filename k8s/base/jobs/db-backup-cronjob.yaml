apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  labels:
    app.kubernetes.io/name: db-backup
    app.kubernetes.io/part-of: ondc
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: db-backup
        spec:
          containers:
            - name: backup
              image: postgres:17-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/ondc_${TIMESTAMP}.sql.gz"
                  pg_dump "$DATABASE_URL" | gzip > "$BACKUP_FILE"
                  echo "Backup created: $BACKUP_FILE ($(du -sh "$BACKUP_FILE" | cut -f1))"
                  find /backups -name "ondc_*.sql.gz" -mtime +30 -delete
                  echo "Cleanup complete"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: DATABASE_URL
              volumeMounts:
                - name: backup-volume
                  mountPath: /backups
              resources:
                requests:
                  memory: 128Mi
                  cpu: 100m
                limits:
                  memory: 512Mi
                  cpu: 500m
          restartPolicy: OnFailure
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
