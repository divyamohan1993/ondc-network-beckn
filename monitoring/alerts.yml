groups:
  - name: ondc_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ONDC service {{ $labels.job }} is down"

      - alert: HighErrorRate
        expr: rate(ondc_requests_total{status="error"}[5m]) / rate(ondc_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Error rate above 5% for {{ $labels.action }}"

      - alert: HighLatency
        expr: ondc_latency_ms{quantile="0.95"} > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 5s for {{ $labels.action }}"

      - alert: SLAViolations
        expr: rate(ondc_sla_violations_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "SLA violations detected for {{ $labels.action }}"

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Less than 10% disk space remaining"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 90% for {{ $labels.container_name }}"
