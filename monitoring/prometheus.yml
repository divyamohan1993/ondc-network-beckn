global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ondc-registry"
    static_configs:
      - targets: ["registry:3001"]
    metrics_path: /metrics

  - job_name: "ondc-gateway"
    static_configs:
      - targets: ["gateway:3002"]
    metrics_path: /metrics

  - job_name: "ondc-bap"
    static_configs:
      - targets: ["bap:3004"]
    metrics_path: /metrics

  - job_name: "ondc-bpp"
    static_configs:
      - targets: ["bpp:3005"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
